# Main scenarios reproduce the protocol declared in the manuscript.
# The quick scenario exists only to validate a remote environment before a long run.
defaults:
  partition: dirichlet
  dirichlet_alpha: 0.5
  total_clients: 100
  clients_per_round: 10
  rounds: 200
  local_epochs: 5
  batch_size: 32
  lr: 0.01
  eval_every: 10
  parallel_clients: 0
  track_grad_norm: true
  performance_mode: true

local_training:
  optimizer: SGD
  momentum: 0.9
  weight_decay: 0.0001
  scheduler: constant
  model_initialization: pytorch_default

maml_select:
  inner_lr: 0.01
  outer_lr: 0.001
  inner_steps: 1
  lambda_latency: 0.5
  target_latency_quantile: 0.5
  normalize_latency_penalty: true
  exploration_clients: 1
  selector_seed: 2026

maml_select_v2:
  inner_lr: 0.01
  outer_lr: 0.001
  inner_steps: 1
  lambda_latency: 0.25
  target_latency_quantile: 0.5
  normalize_latency_penalty: true
  exploration_clients: 1
  learned_clients: 6
  diversity_clients: 2
  fairness_clients: 1
  cost_clients: 1
  overuse_factor: 1.5
  energy_weight: 0.10
  diversity_weight: 0.35
  fairness_weight: 0.35
  novelty_weight: 0.20
  uncertainty_weight: 0.05
  global_reward_weight: 0.0
  reward_ema_alpha: 0.30
  replay_capacity: 128
  support_size: 32
  pairwise_weight: 0.30
  listwise_weight: 0.10
  ranking_temperature: 0.50
  selector_seed: 2026

criticalfl:
  delta: 0.01
  growth_factor: 2.0
  sparse_fraction: 0.20

fedgcs:
  latent_dim: 16
  optimisation_steps: 5
  lr: 0.001
  beta_kl: 0.01
  selector_seed: 2026

scenarios:
  fashion_quick:
    dataset: Fashion-MNIST
    model: LightCNN
    total_clients: 30
    clients_per_round: 5
    rounds: 12
    local_epochs: 1
    eval_every: 3
  fashion_main:
    dataset: Fashion-MNIST
    model: LightCNN
    report_accuracy_target: 0.70
  fashion_pilot:
    dataset: Fashion-MNIST
    model: LightCNN
    total_clients: 30
    clients_per_round: 5
    rounds: 36
    local_epochs: 1
    eval_every: 3
  fashion_v2_pilot:
    dataset: Fashion-MNIST
    model: LightCNN
    rounds: 50
    eval_every: 5
  cifar10_main:
    dataset: CIFAR-10
    model: ResNet18
    report_accuracy_target: 0.88
  cifar10_review_100:
    dataset: CIFAR-10
    model: ResNet18
    rounds: 100
    report_accuracy_target: 0.88
  cifar10_reconciled:
    dataset: CIFAR-10
    model: ResNet18
    report_accuracy_target: 0.88
    cifar10_augment: true
    lr: 0.01
    lr_scheduler: cosine
    lr_warmup_rounds: 10
  cifar100_main:
    dataset: CIFAR-100
    model: ResNet18
  cifar100_v2_pilot:
    dataset: CIFAR-100
    model: ResNet18
    rounds: 50
    eval_every: 5
  fashion_energy_target:
    dataset: Fashion-MNIST
    model: LightCNN
    rounds: 200
    eval_every: 5
    report_accuracy_target: 0.70
    stop_on_accuracy_target: true
  cifar10_energy_target:
    dataset: CIFAR-10
    model: ResNet18
    rounds: 200
    eval_every: 5
    report_accuracy_target: 0.88
    stop_on_accuracy_target: true
  fashion_alpha_0p1:
    dataset: Fashion-MNIST
    model: LightCNN
    dirichlet_alpha: 0.1
    rounds: 200
  fashion_alpha_1p0:
    dataset: Fashion-MNIST
    model: LightCNN
    dirichlet_alpha: 1.0
    rounds: 200
  fashion_n20:
    dataset: Fashion-MNIST
    model: LightCNN
    total_clients: 20
    clients_per_round: 2
    rounds: 200
  fashion_n40:
    dataset: Fashion-MNIST
    model: LightCNN
    total_clients: 40
    clients_per_round: 4
    rounds: 200
  fashion_n50:
    dataset: Fashion-MNIST
    model: LightCNN
    total_clients: 50
    clients_per_round: 5
    rounds: 200
  fashion_n80:
    dataset: Fashion-MNIST
    model: LightCNN
    total_clients: 80
    clients_per_round: 8
    rounds: 200
  fashion_v2_cpu_main:
    dataset: Fashion-MNIST
    model: LightCNN
    report_accuracy_target: 0.70
  cifar10_v2_cpu_main:
    dataset: CIFAR-10
    model: ResNet18
    report_accuracy_target: 0.88
    cifar10_augment: true
    lr: 0.01
    lr_scheduler: cosine
    lr_warmup_rounds: 10

integrated_methods:
  - baseline.fedavg
  - system_aware.fedcs
  - system_aware.oort
  - system_aware.tifl
  - ml.fedcor
  - research.criticalfl
  - research.fedgcs
  - research.maml_select

experiments:
  - id: quick_validation
    profiles: [quick]
    scenarios: [fashion_quick]
    methods: [baseline.fedavg, research.maml_select, research.fedgcs]
    seeds: [42]

  - id: main_benchmarks
    profiles: [core, full]
    scenarios: [fashion_main, cifar10_main]
    methods_from: integrated_methods
    seeds: [42, 123, 2026]

  - id: cifar10_reconciled
    profiles: [core, full]
    scenarios: [cifar10_reconciled]
    methods_from: integrated_methods
    seeds: [42, 123, 2026]

  - id: cifar100_benchmarks
    profiles: [cifar100]
    scenarios: [cifar100_main]
    methods_from: integrated_methods
    seeds: [42, 123, 2026]

  - id: cifar100_v2_benchmarks
    profiles: [cifar100_v2]
    scenarios: [cifar100_main]
    seeds: [42, 123, 2026]
    method_variants:
      - key: research.maml_select_v2
        label: "MAML-Select v2 CIFAR-100"
        params:
          lambda_latency: 0.10
          energy_weight: 0.05
          diversity_weight: 0.55
          fairness_weight: 0.25
          novelty_weight: 0.35
          uncertainty_weight: 0.10
          global_reward_weight: 0.02
          learned_clients: 5
          diversity_clients: 3
          fairness_clients: 1
          cost_clients: 1
          exploration_clients: 1
          overuse_factor: 1.75
          replay_capacity: 256
          support_size: 48
          pairwise_weight: 0.45
          listwise_weight: 0.15
          ranking_temperature: 0.40
          reward_ema_alpha: 0.40

  - id: maml_v2_windows_cpu
    profiles: [maml_v2_cpu]
    scenarios: [fashion_v2_cpu_main, cifar10_v2_cpu_main]
    seeds: [42, 123, 2026]
    method_variants:
      - key: research.maml_select_v2
        label: "MAML-Select v2 CPU-accuracy"
        params:
          lambda_latency: 0.10
          energy_weight: 0.05
          diversity_weight: 0.55
          fairness_weight: 0.25
          novelty_weight: 0.35
          uncertainty_weight: 0.10
          global_reward_weight: 0.02
          learned_clients: 5
          diversity_clients: 3
          fairness_clients: 1
          cost_clients: 1
          exploration_clients: 1
          overuse_factor: 1.75
          replay_capacity: 256
          support_size: 48
          pairwise_weight: 0.45
          listwise_weight: 0.15
          ranking_temperature: 0.40
          reward_ema_alpha: 0.40

  - id: maml_v2_pilot_compare
    profiles: [maml_v2]
    scenarios: [fashion_v2_pilot, cifar100_v2_pilot]
    methods: [research.maml_select, research.maml_select_v2]
    seeds: [42]

  - id: maml_v2_tuning
    profiles: [maml_v2]
    scenarios: [fashion_v2_pilot]
    seeds: [42]
    method_variants:
      - {key: research.maml_select_v2.default, label: "v2 default", params: {}}
      - {key: research.maml_select_v2.no_diversity, label: "v2 w/o diversity", params: {diversity_clients: 0, diversity_weight: 0.0}}
      - {key: research.maml_select_v2.no_fairness, label: "v2 w/o fairness", params: {fairness_clients: 0, fairness_weight: 0.0}}
      - {key: research.maml_select_v2.no_uncertainty, label: "v2 w/o uncertainty", params: {uncertainty_weight: 0.0}}
      - {key: research.maml_select_v2.explore_1, label: "v2 exploration=1", params: {exploration_clients: 1}}
      - {key: research.maml_select_v2.explore_2, label: "v2 exploration=2", params: {exploration_clients: 2, learned_clients: 5}}
      - {key: research.maml_select_v2.explore_3, label: "v2 exploration=3", params: {exploration_clients: 3, learned_clients: 4}}
      - {key: research.maml_select_v2.lambda_0p1, label: "v2 lambda=0.1", params: {lambda_latency: 0.1}}
      - {key: research.maml_select_v2.lambda_0p25, label: "v2 lambda=0.25", params: {lambda_latency: 0.25}}
      - {key: research.maml_select_v2.lambda_0p5, label: "v2 lambda=0.5", params: {lambda_latency: 0.5}}

  - id: local_fashion_pilot
    profiles: [pilot]
    scenarios: [fashion_pilot]
    methods: [baseline.fedavg, system_aware.oort, research.maml_select, research.fedgcs]
    seeds: [42]

  - id: local_lambda_pilot
    profiles: [pilot_lambda]
    scenarios: [fashion_pilot]
    seeds: [42]
    method_variants:
      - {key: research.maml_select.pilot_lambda_0p0, label: "lambda=0.0", params: {lambda_latency: 0.0}}
      - {key: research.maml_select.pilot_lambda_0p1, label: "lambda=0.1", params: {lambda_latency: 0.1}}
      - {key: research.maml_select.pilot_lambda_0p25, label: "lambda=0.25", params: {lambda_latency: 0.25}}
      - {key: research.maml_select.pilot_lambda_0p5, label: "lambda=0.5", params: {lambda_latency: 0.5}}
      - {key: research.maml_select.pilot_lambda_1p0, label: "lambda=1.0", params: {lambda_latency: 1.0}}

  - id: lambda_sensitivity
    profiles: [core, full]
    scenarios: [fashion_main]
    seeds: [42, 123, 2026]
    method_variants:
      - {key: research.maml_select.lambda_0p1, label: "lambda=0.1", params: {lambda_latency: 0.1}}
      - {key: research.maml_select.lambda_0p5, label: "lambda=0.5", params: {lambda_latency: 0.5}}
      - {key: research.maml_select.lambda_1p0, label: "lambda=1.0", params: {lambda_latency: 1.0}}
      - {key: research.maml_select.lambda_5p0, label: "lambda=5.0", params: {lambda_latency: 5.0}}

  - id: feature_ablation
    profiles: [core, full]
    scenarios: [fashion_main]
    seeds: [42, 123, 2026]
    method_variants:
      - {key: research.maml_select.full, label: "all features", params: {disabled_features: []}}
      - {key: research.maml_select.no_loss, label: "without loss", params: {disabled_features: [loss]}}
      - {key: research.maml_select.no_grad_norm, label: "without gradient norm", params: {disabled_features: [grad_norm]}}
      - {key: research.maml_select.no_latency, label: "without latency", params: {disabled_features: [latency]}}
      - {key: research.maml_select.no_battery, label: "without battery", params: {disabled_features: [battery]}}
      - {key: research.maml_select.no_frequency, label: "without frequency", params: {disabled_features: [frequency]}}
      - {key: research.maml_select.no_staleness, label: "without staleness", params: {disabled_features: [staleness]}}

  - id: cifar10_lambda_sensitivity
    profiles: [review_hardening]
    scenarios: [cifar10_review_100]
    seeds: [42, 123, 2026]
    method_variants:
      - {key: research.maml_select.cifar10_lambda_0p1, label: "lambda=0.1", params: {lambda_latency: 0.1}}
      - {key: research.maml_select.cifar10_lambda_0p5, label: "lambda=0.5", params: {lambda_latency: 0.5}}
      - {key: research.maml_select.cifar10_lambda_1p0, label: "lambda=1.0", params: {lambda_latency: 1.0}}
      - {key: research.maml_select.cifar10_lambda_5p0, label: "lambda=5.0", params: {lambda_latency: 5.0}}

  - id: inner_step_ablation
    profiles: [review_hardening]
    scenarios: [cifar10_review_100]
    seeds: [42, 123, 2026]
    method_variants:
      - {key: research.maml_select.inner_steps_1, label: "inner steps=1", params: {inner_steps: 1}}
      - {key: research.maml_select.inner_steps_2, label: "inner steps=2", params: {inner_steps: 2}}
      - {key: research.maml_select.inner_steps_5, label: "inner steps=5", params: {inner_steps: 5}}

  - id: hardware_energy_to_target
    profiles: [energy, full]
    scenarios: [fashion_energy_target, cifar10_energy_target]
    methods: [baseline.fedavg, system_aware.oort, research.criticalfl, research.fedgcs, research.maml_select]
    seeds: [42, 123, 2026]

  - id: heterogeneity
    profiles: [full]
    scenarios: [fashion_alpha_0p1, fashion_main, fashion_alpha_1p0]
    methods: [baseline.fedavg, system_aware.oort, research.criticalfl, research.fedgcs, research.maml_select]
    seeds: [42, 123, 2026]

  - id: scaling
    profiles: [full]
    scenarios: [fashion_n20, fashion_n40, fashion_n80, fashion_main]
    methods: [baseline.fedavg, research.maml_select]
    seeds: [42, 123, 2026]

  - id: scaling_overhead
    profiles: [scaling]
    scenarios: [fashion_n20, fashion_n40, fashion_n80, fashion_main]
    methods_from: integrated_methods
    seeds: [42]

  # Selector-architecture (meta-policy capacity) ablation, added for the resubmission
  # to answer the reviewer note that the 6-64-64-1 MLP width is never ablated.
  # Fashion-MNIST/LightCNN (fashion_main, 200 rounds) for direct comparability with
  # the existing lambda_sensitivity and feature_ablation Fashion tables.
  - id: architecture_ablation
    profiles: [arch_ablation]
    scenarios: [fashion_main]
    seeds: [42, 123, 2026]
    method_variants:
      - {key: research.maml_select.hidden_16, label: "hidden=16", params: {hidden_dim: 16}}
      - {key: research.maml_select.hidden_32, label: "hidden=32", params: {hidden_dim: 32}}
      - {key: research.maml_select.hidden_64, label: "hidden=64", params: {hidden_dim: 64}}
      - {key: research.maml_select.hidden_128, label: "hidden=128", params: {hidden_dim: 128}}

  # Lambda no-penalty anchor (lambda=0), added for the resubmission so the lambda sweep
  # has a pure-accuracy baseline on BOTH datasets. Dedicated profile so it can be launched
  # without re-running the completed 21-run lambda/inner-step campaign. Scenarios mirror
  # the existing lambda tables (CIFAR-10 = cifar10_review_100/100 rounds, Fashion = fashion_main).
  - id: cifar10_lambda_anchor
    profiles: [lambda_anchor]
    scenarios: [cifar10_review_100]
    seeds: [42, 123, 2026]
    method_variants:
      - {key: research.maml_select.cifar10_lambda_0p0, label: "lambda=0.0", params: {lambda_latency: 0.0}}

  - id: fashion_lambda_anchor
    profiles: [lambda_anchor]
    scenarios: [fashion_main]
    seeds: [42, 123, 2026]
    method_variants:
      - {key: research.maml_select.lambda_0p0, label: "lambda=0.0", params: {lambda_latency: 0.0}}
